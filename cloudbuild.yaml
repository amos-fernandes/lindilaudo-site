steps:
  # Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lindilaudo-site:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lindilaudo-site:latest'
      - '.'

  # Push para Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/lindilaudo-site:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/lindilaudo-site:latest']

  # Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'lindilaudo-site'
      - '--image'
      - 'gcr.io/$PROJECT_ID/lindilaudo-site:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--concurrency'
      - '1000'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'

images:
  - 'gcr.io/$PROJECT_ID/lindilaudo-site:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/lindilaudo-site:latest'

options:
  logging: CLOUD_LOGGING_ONLY
