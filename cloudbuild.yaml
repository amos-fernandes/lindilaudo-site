steps:
  # Build do backend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lindilaudo-backend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lindilaudo-backend:latest'
      - './backend'

  # Build do frontend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lindilaudo-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/lindilaudo-frontend:latest'
      - './frontend'

  # Push das imagens
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/lindilaudo-backend:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/lindilaudo-backend:latest']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/lindilaudo-frontend:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/lindilaudo-frontend:latest']

  # Deploy do backend no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'lindilaudo-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/lindilaudo-backend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--concurrency'
      - '80'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'NODE_ENV=production'

  # Deploy do frontend no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'lindilaudo-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/lindilaudo-frontend:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--concurrency'
      - '1000'
      - '--max-instances'
      - '5'

images:
  - 'gcr.io/$PROJECT_ID/lindilaudo-backend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/lindilaudo-backend:latest'
  - 'gcr.io/$PROJECT_ID/lindilaudo-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/lindilaudo-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
